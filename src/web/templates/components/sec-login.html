<div class="vault-auth">
    <h2>Login</h2>
    <form id="login-form" action="/api/login" method="post">
        <label for="login-username">Username:</label>
        <input type="text" id="login-username" name="username" required autocomplete="username">
        <label for="login-password">Password:</label>
        <input type="password" id="login-password" name="password" required autocomplete="current-password">
        <button type="submit">Login</button>
    </form>

    <h2>Create Account</h2>
    <form id="create-user-form" action="/api/register" method="post">
        <label for="create-username">Username:</label>
        <input type="text" id="create-username" name="username" required autocomplete="username">
        <label for="create-password">Password:</label>
        <input type="password" id="create-password" name="password" required autocomplete="new-password">
        <label for="confirm-password">Confirm Password:</label>
        <input type="password" id="confirm-password" name="confirm_password" required autocomplete="new-password">
        <button type="submit">Create Account</button>
    </form>
</div>

<script>
// Before submitting login, derive vault key from (password, username) using PBKDF2
// and store it in sessionStorage. The key never leaves the browser.
document.getElementById("login-form").addEventListener("submit", async function(ev) {
  ev.preventDefault();
  const username = document.getElementById("login-username").value;
  const password = document.getElementById("login-password").value;

  try {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
      "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
    );
    const key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: enc.encode(username), iterations: 100000, hash: "SHA-256" },
      keyMaterial,
      { name: "AES-GCM", length: 256 },
      true,   // exportable so we can store it
      ["encrypt", "decrypt"]
    );
    const jwk = await crypto.subtle.exportKey("jwk", key);
    sessionStorage.setItem("vaultKey", JSON.stringify(jwk));
  } catch (e) {
    console.error("Key derivation failed:", e);
  }

  // Submit the form normally so the server can validate credentials + set the cookie
  this.submit();
});
</script>
