<head>
    <meta charset='utf-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1' />
    
    <title>{{title}}</title>
    
    <!-- Solves problem of page flashabning user when in darkmode, while navigating thereby loading/reloading other page -->
    <!-- https://dev.to/javascriptwizzard/dark-mode-done-right-performance-accessibility-considerations-43b1 -->
    <!-- Dark mode must be applied before CSS to prevent flash. This script is synchronous and blocking by design. -->
    <script>
(function() {
    var stored = localStorage.getItem('darkMode');
    var root = document.documentElement;
    if (stored === '1') {
        root.classList.add('dark-mode');
        root.classList.remove('light-mode');
    } else if (stored === '0') {
        root.classList.add('light-mode');
        root.classList.remove('dark-mode');
    } else {
        // No saved choice: let CSS follow the system preference.
        root.classList.remove('dark-mode');
        root.classList.remove('light-mode');
    }
})();
    </script>
    
    <link rel='stylesheet' href='/public/css/style.css' />

    <script>
const prefetched = new Set();

function prefetch(url) {
    if (prefetched.has(url)) return;
    prefetched.add(url);

    const link = document.createElement("link");
    link.rel = "prefetch";
    link.href = url;
    document.head.appendChild(link);
}

document.addEventListener("mouseover", (e) => {
    const a = e.target.closest("a");
    if (!a) return;

    const href = a.getAttribute("href");
    if (!href) return;

    // Internal only: starts with / or same origin
    const isInternal =
        href.startsWith("/") ||
        a.origin === window.location.origin;

    if (isInternal) prefetch(a.href);
});
    </script>
</head>
